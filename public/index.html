<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Typographic GIF — Text Silhouette Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; }

    html, body {
      background: #0a0a0c;
      color: #e8e4dc;
      height: 100vh;
      overflow: hidden;
    }

    body {
      font-family: Georgia, Palatino, "Times New Roman", serif;
    }

    #art {
      position: relative;
      width: 100vw;
      height: calc(100vh - 36px);
      overflow: hidden;
      background: #0a0a0c;
      contain: strict;
    }

    .line {
      position: absolute;
      left: 0;
      top: 0;
      white-space: nowrap;
      overflow: hidden;
      pointer-events: none;
      will-change: transform;
      contain: layout style paint;
    }

    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(6, 6, 10, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    #demo-nav {
      display: flex;
      gap: 6px;
    }

    .demo-btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.5);
      font: 600 11px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .demo-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .demo-btn.active {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font: 400 14px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255, 255, 255, 0.3);
      z-index: 10;
    }

    #stats {
      font: 700 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #fff;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="loading">Loading...</div>
  <div id="art"></div>
  <div id="bottom-bar">
    <div id="demo-nav"></div>
    <div id="stats"></div>
  </div>

</body>
</html>
